<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Songs</title>
  <link rel="stylesheet" href="assets/style.css?v=5">
</head>
<body>
  <header class="top-bar">
    <a class="brand" href="." data-home>Paper Songs</a>
    <span class="brand-tag">fun scientific papers, sung &amp; drawn</span>
  </header>

  <section id="hero" class="hero" hidden>
    <p class="intro">Every once in a while a research paper tells a story too good to
    stay locked inside equations and figures. Here, each one becomes a song —
    and an animated short to go with it.</p>
  </section>

  <main>
    <div id="gallery" class="gallery" hidden>
      <p class="loading">Loading songs&hellip;</p>
    </div>

    <div id="watch" class="watch-grid" hidden>
      <div id="watch-main"></div>
      <aside id="watch-side"></aside>
    </div>
  </main>

  <footer class="site-footer">
    <p>Made for the joy of learning out loud.</p>
  </footer>

  <script src="assets/app.js?v=5"></script>
  <script>initApp();</script>
</body>
</html>
